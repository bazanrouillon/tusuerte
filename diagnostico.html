<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diagnóstico — TuSuerte.pe</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 700px; margin: 30px auto; padding: 20px; background: #0a2a2d; color: #fff; }
  h1 { color: #ffd700; }
  .test { padding: 12px; margin: 10px 0; border-radius: 8px; border: 2px solid; }
  .ok { background: rgba(57,255,20,.15); border-color: #39ff14; }
  .fail { background: rgba(255,32,32,.2); border-color: #ff2020; }
  .info { background: rgba(0,229,255,.15); border-color: #00e5ff; }
  code { background: #061a1c; padding: 2px 6px; border-radius: 4px; color: #ffd700; }
  a { color: #00e5ff; }
</style>
</head>
<body>
<h1>🩺 Diagnóstico del sistema de cuenta</h1>
<div id="resultados">Cargando...</div>

<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/monedas.js"></script>
<script src="js/pagos.js"></script>
<script src="js/integracion.js"></script>

<script>
function check(nombre, condicion, detalle) {
  const div = document.createElement('div');
  div.className = 'test ' + (condicion ? 'ok' : 'fail');
  div.innerHTML = (condicion ? '✅ ' : '❌ ') + '<strong>' + nombre + '</strong><br><small>' + detalle + '</small>';
  document.getElementById('resultados').appendChild(div);
}

window.addEventListener('load', function() {
  document.getElementById('resultados').innerHTML = '';

  check('1. Script firebase-config.js cargado',
    typeof firebaseConfig !== 'undefined',
    typeof firebaseConfig !== 'undefined'
      ? 'firebaseConfig existe'
      : 'firebaseConfig NO existe — el archivo no cargó. Revisa rutas o consola.'
  );

  check('2. Firebase configurado',
    window.FIREBASE_CONFIGURED === true,
    window.FIREBASE_CONFIGURED === true
      ? 'Tienes credenciales reales pegadas en firebase-config.js'
      : 'Estás en MODO PREVIEW (credenciales placeholder) — esto es ESPERADO si aún no configuraste Firebase'
  );

  check('3. tsAuth cargado (auth.js)',
    typeof window.tsAuth === 'object',
    typeof window.tsAuth === 'object'
      ? 'Módulo de auth disponible'
      : 'auth.js no se cargó — revisa la pestaña Network'
  );

  check('4. tsMonedas cargado (monedas.js)',
    typeof window.tsMonedas === 'object',
    typeof window.tsMonedas === 'object'
      ? 'Módulo de monedas disponible'
      : 'monedas.js no se cargó'
  );

  check('5. tsPagos cargado (pagos.js)',
    typeof window.tsPagos === 'object',
    typeof window.tsPagos === 'object'
      ? 'Módulo de pagos disponible'
      : 'pagos.js no se cargó'
  );

  // Verificar si integracion.js inyectó algo en el body
  // (esta página no tiene section.bloque2, así que iría al fallback de body.firstChild)
  setTimeout(function() {
    const sec = document.getElementById('ts-cuenta-seccion');
    check('6. Sección "Mi Cuenta" inyectada',
      !!sec,
      sec ? 'La sección se inyectó correctamente en el DOM' : 'integracion.js NO inyectó la sección — revisa consola'
    );

    if (sec) {
      const div = document.createElement('div');
      div.className = 'test info';
      div.innerHTML = '<strong>📍 Vista previa de cómo se ve:</strong><br>(Lo que sigue es la sección real inyectada arriba de esta página)';
      document.getElementById('resultados').appendChild(div);
    }

    const div = document.createElement('div');
    div.className = 'test info';
    div.innerHTML = '<strong>Qué hacer ahora:</strong><br>' +
      'Si TODO está ✅ menos el #2, todo está bien — la sección debe aparecer en tu <a href="index.html">index.html</a> en modo PREVIEW.<br><br>' +
      'Si #1, #3, #4, #5 o #6 están ❌:<br>' +
      '1. Abre <a href="index.html">index.html</a><br>' +
      '2. Aprieta <code>F12</code> (o clic derecho → Inspeccionar → Console)<br>' +
      '3. Cuéntame qué errores rojos ves ahí';
    document.getElementById('resultados').appendChild(div);
  }, 1000);
});
</script>
</body>
</html>
