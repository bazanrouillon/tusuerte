# ─── TuSuerte.pe — Configuración Netlify ───────────────────────────────────
# Este archivo le dice a Netlify dónde están las Functions y cómo construir
# el sitio. Súbelo a la raíz del repo.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  # Las dependencias del package.json se instalan automáticamente
  node_bundler = "esbuild"

# Forzar HTTPS y headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# CORS abierto solo para las funciones (las llama tu propio dominio)
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
